<!DOCTYPE html>

<body class="bg-bg-100 text-text font-sans">

        <p>Contact email: <a href="mailto:contact@siargames.com" class="text-accent">contact@siargames.com</a></p>
        <p>Press email: <a href="mailto:press@siargames.com" class="text-accent">press@siargames.com</a></p>
